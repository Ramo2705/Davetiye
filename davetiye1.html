<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sevim Ela & Ramazan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Montserrat:wght@100;200;300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg-color); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; height: 100%; 
            color: var(--white); 
        }

        /* GİRİŞ EKRANI */
        #cover {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s;
            cursor: pointer;
        }
        .cover-hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .monogram-seal {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .char {
            font-family: 'Cormorant Garamond', serif;
            font-size: 110px;
            color: var(--white);
            position: absolute;
            line-height: 1;
            font-weight: 300;
        }
        .char-r { transform: translate(-22px, -18px); z-index: 2; }
        .char-e { transform: translate(18px, 18px); z-index: 1; }

        .open-text {
            position: absolute;
            bottom: -60px;
            color: var(--white);
            letter-spacing: 5px;
            font-size: 0.6rem;
            text-transform: uppercase;
            opacity: 0.5;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        /* ANA İÇERİK */
        #main-content {
            opacity: 0;
            transition: opacity 1s ease-in;
            min-height: 100vh;
            padding: 50px 10px;
            text-align: center;
        }
        .content-visible { opacity: 1 !important; }

        /* GERİ SAYIM */
        .countdown-section {
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .countdown-title {
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        #timer { display: flex; justify-content: center; gap: 15px; }
        .timer-unit span { display: block; font-size: 1.5rem; font-family: 'Cormorant Garamond', serif; }
        .timer-unit label { font-size: 0.5rem; text-transform: uppercase; color: rgba(255,255,255,0.4); }

        /* İSİMLER */
        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }
        .ampersand {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.8rem;
            margin: 5px 0;
            display: block;
        }

        /* AİLE İSİMLERİ - EĞİK ÇİZGİLİ VE SIKI DÜZEN */
        .family-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px 0;
            gap: 15px; /* Çizgi ve isimler arasındaki ideal mesafe */
        }

        .family-box {
            text-align: center;
            min-width: 135px;
        }

        .family-names-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.85;
            display: block;
            margin-bottom: 2px;
        }

        .family-surname-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 5px;
            display: block;
            text-transform: uppercase;
        }

        /* EĞİK ÇİZGİ */
        .family-divider-slanted {
            width: 1px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            transform: rotate(20deg); /* İstediğin o eğik duruş */
            flex-shrink: 0;
            margin: 0 5px;
        }

        /* ETKİNLİK ALANI */
        .event-row { 
            display: flex; 
            justify-content: center; 
            margin: 40px auto; 
            max-width: 600px; 
        }
        .event-box { flex: 1; padding: 0 5px; }
        .event-divider {
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
            margin: 0 5px;
        }
        .event-title { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            padding-bottom: 2px;
        }
        .date-time { font-weight: 200; font-size: 0.7rem; line-height: 1.5; opacity: 0.7; }

        /* BUTONLAR */
        .actions { display: flex; flex-direction: column; gap: 10px; margin: 40px auto 0; max-width: 220px; }
        .btn { 
            border: 1px solid rgba(255,255,255,0.2); 
            color: var(--white); 
            padding: 12px; 
            text-decoration: none; 
            font-size: 0.6rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: 0.4s; 
        }
        .btn:hover { background: var(--white); color: var(--bg-color); }

        @media (max-width: 380px) {
            .family-box { min-width: 120px; }
            .family-names-text { font-size: 0.75rem; }
            .family-surname-text { font-size: 0.95rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div id="cover" onclick="openInvitation()">
        <div class="monogram-seal">
            <div class="char char-r">R</div>
            <div class="char char-e">E</div>
            <p class="open-text">Dokun ve Aç</p>
        </div>
    </div>

    <div id="main-content">
        
        <div class="countdown-section">
            <div class="countdown-title">Büyük Güne Kalan Zaman</div>
            <div id="timer">
                <div class="timer-unit"><span id="days">00</span><label>Gün</label></div>
                <div class="timer-unit"><span id="hours">00</span><label>Saat</label></div>
                <div class="timer-unit"><span id="minutes">00</span><label>Dakika</label></div>
                <div class="timer-unit"><span id="seconds">00</span><label>Saniye</label></div>
            </div>
        </div>

        <div>
            <h1 class="names">SEVİM ELA</h1>
            <span class="ampersand">&</span>
            <h1 class="names">RAMAZAN</h1>
        </div>

        <!-- AİLE İSİMLERİ - EĞİK ÇİZGİLİ SON HALİ -->
        <div class="family-section">
            <div class="family-box">
                <span class="family-names-text">ÜMMÜGÜL & MEHMET</span>
                <span class="family-surname-text">AKAR</span>
            </div>
            
            <div class="family-divider-slanted"></div>

            <div class="family-box">
                <span class="family-names-text">GÜLCAN & AHMET</span>
                <span class="family-surname-text">ÇELEBİ</span>
            </div>
        </div>

        <div class="event-row">
            <div class="event-box">
                <div class="event-title">Kına</div>
                <div class="date-time">
                    27 Ağustos 2026 <br> 
                    Perşembe | 19:00 <br>
                    <span style="display:block; margin-top:5px;">Yalım Garden Kır Düğün Salonu</span>
                </div>
            </div>
            <div class="event-divider"></div>
            <div class="event-box">
                <div class="event-title">Düğün</div>
                <div class="date-time">
                    29 Ağustos 2026 <br> 
                    Cumartesi | 19:00 <br>
                    <span style="display:block; margin-top:5px;">Pınar Düğün Salonu Havuzlu Bahçe</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="https://maps.google.com" target="_blank" class="btn">Kına Konumu</a>
            <a href="https://maps.google.com" target="_blank" class="btn">Düğün Konumu</a>
        </div>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('cover').classList.add('cover-hidden');
            document.getElementById('main-content').classList.add('content-visible');
            startTimer();
        }

        function startTimer() {
            const targetDate = new Date("August 29, 2026 19:00:00").getTime();
            setInterval(function() {
                const now = new Date().getTime();
                const distance = targetDate - now;
                if (distance < 0) {
                    document.getElementById("timer").innerHTML = "MUTLULUKLAR DİLERİZ!";
                    return;
                }
                document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
            }, 1000);
        }
    </script>
</body>
</html>
